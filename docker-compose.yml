services:
  postgres:
    image: postgres:16-alpine
    container_name: texassolver-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: solver
      POSTGRES_PASSWORD: ${DB_PASSWORD:-solverpass}
      POSTGRES_DB: solverdb
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U solver -d solverdb"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  solver-api:
    build:
      context: .
      dockerfile: api/Dockerfile
    container_name: texassolver-api
    restart: unless-stopped
    volumes:
      - solver-jobs:/app/jobs
      - ai-docs:/app/ai_docs
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
      - DATABASE_URL=postgresql+asyncpg://solver:${DB_PASSWORD:-solverpass}@postgres:5432/solverdb
      - SECRET_KEY=${SECRET_KEY:-changeme-use-a-long-random-string-in-production}
      - ACCESS_TOKEN_EXPIRE_DAYS=30
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-qwen2.5:14b}
      - AI_SERVICE_URL=http://ai-service:5001
      - AI_DOCS_DIR=/app/ai_docs
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  ai-service:
    build:
      context: ./ai
      dockerfile: Dockerfile
    container_name: openpoker-ai
    restart: unless-stopped
    volumes:
      - solver-jobs:/app/jobs:ro
      - ai-docs:/app/ai_docs
    ports:
      - "5001:5001"
    environment:
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      - OLLAMA_EMBED_MODEL=${OLLAMA_EMBED_MODEL:-nomic-embed-text}
      - DOCS_DIR=/app/ai_docs
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5001/health')"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: texassolver-ui
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      solver-api:
        condition: service_healthy
    environment:
      - API_URL=http://solver-api:8000

volumes:
  solver-jobs:
  postgres-data:
  ai-docs:
